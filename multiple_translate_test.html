<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Post Auto-Translator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .error-msg { color: #d93526; background: #ffebee; padding: 1rem; border-radius: 8px; display: none; margin-bottom: 1rem; }
        textarea { font-family: monospace; font-size: 0.9rem; }
        .warning-msg { color: #856404; background: #fff3cd; padding: 1rem; border-radius: 8px; display: none; margin-bottom: 1rem; border: 1px solid #ffeeba; }
        .grid-container { align-items: start; gap: 2rem; }
        .button-group {
            display: flex;
            gap: 0.5rem;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            margin-bottom: 0.5rem;
        }

        .field-header label { margin-bottom: 0; }

        #copyBtn, #editBtn { 
            padding: 4px 12px; 
            font-size: 0.8rem; 
            width: auto; 
            margin-bottom: 0;
        }
    </style>
    <script src="names.js"></script>
</head>

<body>
    <main class="container">
    <h1>Social Media Post Auto-Translator</h1>

        <section style="background: #f4f4f4; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 2px dashed #ccc;">
            <h5 style="margin-top: 0;">CSV Batch Translation</h5>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <input type="file" id="csvFileInput" accept=".csv" style="margin-bottom: 0;">
                <button id="processCsvBtn" class="contrast" style="width: auto; margin-bottom: 0;">Process & Download CSV</button>
            </div>
            <small>Only rows with a "гғҶгӮӯгӮ№гғҲ" column matching our templates will be kept.</small>
        </section>

        <div class="grid">
            <!-- Left Column: Input & Settings -->
            <section>
            <div class="field-header">
                <label for="jpInput">Paste Japanese Source Text</label>
            </div>
            <textarea id="jpInput" rows="10" placeholder="Paste the Japanese post here..."></textarea>
                
                <div id="warningMessage" class="warning-msg"></div>
                <div id="errorMessage" class="error-msg"></div>

                <fieldset>
                    <legend>Include Languages:</legend>
                    <label><input type="checkbox" id="langEn" checked> English</label>
                    <label><input type="checkbox" id="langZh" checked> Chinese</label>
                    <label><input type="checkbox" id="langTh" checked> Thai</label>
                </fieldset>

                <button id="translateBtn" class="contrast">Detect & Generate Translation</button>
            </section>

            <!-- Right Column: Output -->
            <section>
                <div class="field-header">
                    <label for="finalOutput">Final Output</label>
                    <div class="button-group">
                        <button id="editBtn" class="secondary outline">з·ЁйӣҶ</button>
                        <button id="copyBtn" class="secondary outline">гӮігғ”гғј</button>
                    </div>
                </div>
                <textarea id="finalOutput" readonly rows="20"></textarea>
            </section>
        </div>

        <script>

            let copyResetTimeout;

            function resetCopyButton() {
                clearTimeout(copyResetTimeout);
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = "гӮігғ”гғј";
                copyBtn.classList.add('outline');
            }

            const glossary_jp_to_en = {
                "гғҗгғҲгӮ№гғ”гӮЁгғігғҲгғӘгғјгғҮгғғгӮӯ": "Battle Spirits Entry Deck",
                "иө«з„”гғҺйўЁзүҷ": "/ Fangs of the Crimson",
                "зҙ«е№»гғҺиЎҖйҶ’": "/ Specter of the Violet",
                "зҝҶжө·гғҺз”Ійӯҡ": "/ Predator of the Wild",
                "зҷҪе‘ҪгғҺйүұдәә": "/ Colossus of the White",
                "з…ҢйҷҪгғҺйӣ·з«ң": "/ Dragon of the Thunderbolt",
                "еүөдё–гҒ®йј“еӢ•": "/ The Pulse of Genesis",
                "и’јж·өгғҺеҮ¶зҚЈ": "/ Savage of the Azure Abyss",
                "ж°ёзҡҮгҒ®ијқгҒҚ": "/ Radiance of the Eternal Emperor",
                "гғ–гғјгӮ№гӮҝгғјгғ‘гғғгӮҜ DUAL REVOLUTION": "BOOSTER PACK DUAL REVOLUTION",
                "гӮ№гӮҝгғјгғҲгғҮгғғгӮӯ DIGIMON BEATBREAK": "STARTER DECK DIGIMON BEATBREAK",
                "е№»жғ‘гҒ®зҝ”йўЁ": "/ Enchanted Skywind",
                "гғҸгғӨгӮұгғігғ»гӮөгғ¬гғҠ": "hayaken_sarena"
            }

            const glossary_jp_to_zh = {
                "гғ–гғјгӮ№гӮҝгғјгғ‘гғғгӮҜ DUAL REVOLUTION": "иЈңе……еҢ… йӣҷйҮҚе·Ёи®Ҡ",
                "гӮ№гӮҝгғјгғҲгғҮгғғгӮӯ DIGIMON BEATBREAK": "иө·е§ӢзүҢзө„ зҜҖеҘҸз ҙзўҺ"
            }

            const colorMap = {
                "з·‘": { en: "Green", zh: "з¶ ", th: "аёӘаёөа№ҖаёӮаёөаёўаё§" },
                "зҷҪ": { en: "White", zh: "зҷҪ", th: "аёӘаёөаёӮаёІаё§" },
                "й»„": { en: "Yellow", zh: "й»ғ", th: "аёӘаёөа№Җаё«аёҘаё·аёӯаёҮ" },
                "иөӨ": { en: "Red", zh: "зҙ…", th: "аёӘаёөа№Ғаё”аёҮ" },
                "йқ’": { en: "Blue", zh: "йқ’", th: "аёӘаёөаёҷа№үаёіа№ҖаёҮаёҙаёҷ" },
                "зҙ«": { en: "Purple", zh: "зҙ«", th: "аёӘаёөаёЎа№Ҳаё§аёҮ" }
            };


            let missingTranslations = [];

            function getDigimonName(name) {
                if (digimon_names[name]) {
                    return name + " / " + digimon_names[name];
                } else {
                    missingTranslations.push(`гғҮгӮёгғўгғі: ${name} (иӢұеҗҚжңӘзҷ»йҢІ)`);
                    return name;
                }
            }

            function getOnePieceName(name) {
                if (onepiece_names[name]) {
                    return name + " / " + onepiece_names[name];
                } else {
                    missingTranslations.push(`ONE PIECE: ${name} (иӢұеҗҚжңӘзҷ»йҢІ)`);
                    return name;
                }
            }


            function translateColor(jpColor, lang) {
                return (colorMap[jpColor] && colorMap[jpColor][lang]) ? colorMap[jpColor][lang] : jpColor;
            }

            /** 
             * LINK TRANSFORMER
             * Logic for converting JP links to localized links
             **/
            function transformLink(url, lang, isEternal = false) {
                if (!url) return "";
                const domainRegex = /(www\.)?battlespirits\.com/;
                let targetDomain;
                
                if (isEternal) {
                    targetDomain = (lang === 'zh') ? 'tw.battlespirits.com' : 'en.battlespirits.com';
                } else {
                    targetDomain = (lang === 'zh') ? 'asia-tw.battlespirits.com' : 'asia-en.battlespirits.com';
                }
                
                return url.replace(domainRegex, targetDomain);
            }

            function localizeBSName(text, lang) {
                if (!text) return "";
                if (lang === 'zh') return text;
                
                let localizedText = text;
                let foundMatch = false;
            
                for (const [jp, en] of Object.entries(glossary_jp_to_en)) {
                    if (localizedText.includes(jp)) {
                        foundMatch = true;
                        if (String(en).includes("/")) {
                            localizedText = localizedText.replace(jp, `${jp} ${en}`);
                        } else {
                            localizedText = localizedText.replace(jp, en);
                        }
                    }
                }
            
                // Warning for missing Battle Spirits title in English/Thai
                if (lang !== 'zh' && !foundMatch) {
                    const warningMsg = `BSгӮҝгӮӨгғҲгғ«: ${text} (иӢұеҗҚжңӘзҷ»йҢІ)`;
                    if (!missingTranslations.includes(warningMsg)) {
                        missingTranslations.push(warningMsg);
                    }
                }
            
                return localizedText;
            }

            function localizeDigimonPackName(text, lang) {
                if (!text) return "";
                let localizedText = text;
                let foundMatch = false;
            
                if (lang === 'zh') {
                    for (const [jp, zh] of Object.entries(glossary_jp_to_zh)) {
                        if (localizedText.includes(jp)) {
                            localizedText = localizedText.replace(jp, zh);
                        }
                    }
                    // Simplified check: if it's still the same after glossary check, it's "not found"
                    // (Optional: you can add a warning for Chinese here too if needed)
                } else if (lang === 'en' || lang === 'th') {
                    for (const [jp, en] of Object.entries(glossary_jp_to_en)) {
                        if (localizedText.includes(jp)) {
                            foundMatch = true;
                            localizedText = localizedText.replace(jp, en);
                        }
                    }
            
                    // Warning for missing Digimon Pack title in English/Thai
                    if (!foundMatch) {
                        const warningMsg = `гғҮгӮёгғўгғігғ‘гғғгӮҜеҗҚ: ${text} (иӢұеҗҚжңӘзҷ»йҢІ)`;
                        if (!missingTranslations.includes(warningMsg)) {
                            missingTranslations.push(warningMsg);
                        }
                    }
                }
            
                return localizedText;
            }

            /** 
             * TEMPLATES
             * pattern: Regex to match normalized (single-spaced) text.
             * vars: mapping match groups to specific logic (like link transformation).
             **/
            const translationTemplates = [
                {
                    name: "Card Reveal",
                    // $1: Code, $2: Card Name, $3: Pack Name, $4: Date, $5: Suffix, $6: URL
                    pattern: /гҖҗ(.*?)гӮ«гғјгғүзҙ№д»ӢгҖ‘\s*ж–°иҰҸгӮ«гғјгғүгҖҢ(.*?)гҖҚгӮ’е…¬й–ӢпјҒ\s*гҖҺ(.*?)гҖҸгҒҜ(.*?)(?:\(.\))?(зҷәеЈІдәҲе®ҡ|зҷәеЈІдёӯ|зҷәеЈІ)пјҒ\s*рҹ”Ҫе•Ҷе“ҒгғҡгғјгӮё\s*(https?:\/\/\S+)/,
                    prefix: (m) => `гҖҗ${m[1]} Card Reveal / еҚЎзүҢд»Ӣзҙ№ / а№Ғаёҷаё°аёҷаёіаёҒаёІаёЈа№Ңаё”гҖ‘\n\n`,
                    outputs: {
                        en: (m) => `Revealing the new card "${m[2]}"!\n[${localizeBSName(m[3], 'en').replace("гғҗгғҲгғ«гӮ№гғ”гғӘгғғгғ„", "Battle Spirits").replace("гӮЁгӮҝгғјгғҠгғ«", "Eternal").replace("гғ–гғјгӮ№гӮҝгғј", " Booster:")}] will be available starting ${m[4]}!\nрҹ”ҪDetails:\n${transformLink(m[6], 'en', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        zh: (m) => `е…¬й–ӢгҖҢ${m[2]}гҖҚеҚЎзүҢпјҒ\nгҖҠ${m[3].replace("гғҗгғҲгғ«гӮ№гғ”гғӘгғғгғ„", "Battle Spirits").replace("гғҗгғҲгӮ№гғ”гӮЁгғігғҲгғӘгғјгғҮгғғгӮӯ", "Battle Spiritsе…Ҙй–ҖзүҢзө„").replace("гӮЁгӮҝгғјгғҠгғ«", "Eternal").replace("гғ–гғјгӮ№гӮҝгғј", "иЈңе……еҢ…")}гҖӢе°Үж–ј ${m[4]} зҷје”®пјҒ\nрҹ”Ҫи©ізҙ°пјҡ\n${transformLink(m[6], 'zh', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        th: (m) => `аёЎаёІа№ҒаёҘа№үаё§! аёҒаёІаёЈа№Ңаё”а№ғаё«аёЎа№Ҳ вҖң${m[2]}вҖқ!\nвҖң${localizeBSName(m[3], 'th').replace("гғҗгғҲгғ«гӮ№гғ”гғӘгғғгғ„", "Battle Spirits").replace("гӮЁгӮҝгғјгғҠгғ«", "Eternal").replace("гғ–гғјгӮ№гӮҝгғј", " Booster:")}вҖқ аёЎаёөаёҒаёіаё«аёҷаё”аё§аёІаёҮаёҲаёіаё«аёҷа№ҲаёІаёў ${m[4]} аёҷаёөа№ү!\nрҹ”ҪаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”\n${transformLink(m[6], 'th', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}`
                    },
                    hashtags: "#BattleSpirits"
                },
                {
                    name: "Product Reveal",
                    // Matches: гҖҗID е•Ҷе“Ғзҙ№д»ӢгҖ‘... гӮ№гӮҝгғігғҖгғјгғүз¬¬[дәҢ2]ејҫгҖҺPackгҖҸгҒ§зҷ»е ҙгҒҷгӮӢ...гӮӨгғ©гӮ№гғҲгӮ’е…¬й–ӢпјҒ
                    // $1: ID, $2: PackName, $3: Color, $4: CardName, $5: PackName(repeat), $6: Date
                    pattern: /гҖҗ(.*?)е•Ҷе“Ғзҙ№д»ӢгҖ‘.*?гӮ№гӮҝгғігғҖгғјгғүз¬¬[дәҢ2]ејҫгҖҺ(.*?)гҖҸгҒ§зҷ»е ҙгҒҷгӮӢ(.*?)гҒ®Xгғ¬гӮўгҖҢ(.*?)гҖҚгҒ®гӮӨгғ©гӮ№гғҲгӮ’е…¬й–ӢпјҒ.*?гҖҺгғ–гғјгӮ№гӮҝгғјгғ‘гғғгӮҜ (.*?)гҖҸгҒҜ(.*?)(?:\(.\))?(зҷәеЈІ|зҷәеЈІдёӯ)пјҒ/,
                    prefix: (m) => `гҖҗ${m[1]} Product Reveal / е•Ҷе“Ғе…¬й–Ӣ / аёӮа№үаёӯаёЎаё№аёҘаёӘаёҙаёҷаё„а№үаёІгҖ‘\n\n`,
                    outputs: {
                        en: (m) => `Revealing the illustration for ${translateColor(m[3], 'en')} X Rare "${m[4]}"!\nStandard 2nd Booster Pack [${localizeBSName(m[2], 'en')}] will be available starting ${m[6]}!\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        zh: (m) => `е…¬й–Ӣе°Үж–јStandardзі»еҲ—з¬¬дәҢеҪҲгҖҠ${m[2]}гҖӢдёӯзҷ»е ҙзҡ„${translateColor(m[3], 'zh')}еұ¬жҖ§XзЁҖжңүгҖҢ${m[4]}гҖҚжҸ’ең–пјҒ\nгҖҠиЈңе……еҢ… ${m[5]}гҖӢе°Үж–ј ${m[6]} зҷје”®пјҒ\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        th: (m) => `аёЎаёІа№ҒаёҘа№үаё§! аё аёІаёһаёӯаёҙаёҘаёҘаёұаёӘаё•а№ҢаёӮаёӯаёҮ X Rare ${translateColor(m[3], 'th')} вҖң${m[4]}вҖқ!\nStandard 2nd Booster Pack вҖң${localizeBSName(m[5], 'th')}вҖқ аёЎаёөаёҒаёіаё«аёҷаё”аё§аёІаёҮаёҲаёіаё«аёҷа№ҲаёІаёў ${m[6]} аёҷаёөа№ү!`
                    },
                    hashtags: "#BattleSpirits"
                },
                {
                    name: "Battlespirit Glitter Card",
                    // $1: ID, $2: Date, $3: Full Pack Name, $4: Pack Name (repeat), $5: Date (repeat), $6: Status, $7: URL
                    pattern: /гҖҗ(.*?) SECRETе…¬й–ӢгҖ‘\s*(.*?)(?:\(.\))?зҷәеЈІгҖҺ(.*?)гҖҸгҒ®SECRETзүҲгӮ«гғјгғүгӮ’е…¬й–ӢпјҒ.*?гҖҺгғ–гғјгӮ№гӮҝгғјгғ‘гғғгӮҜ (.*?)гҖҸгҒҜ(.*?)(?:\(.\))?(зҷәеЈІ|зҷәеЈІдёӯ)пјҒ\s*рҹ”Ҫе•Ҷе“ҒгғҡгғјгӮё\s*(https?:\/\/\S+)/,
                    prefix: (m) => `гҖҗ${m[1]} SECRET Reveal / SECRETе…¬й–Ӣ / а№ҖаёңаёўаёҒаёІаёЈа№Ңаё” SECRETгҖ‘\n\n`,
                    outputs: {
                        en: (m) => `Revealing the SECRET version cards from [${localizeBSName(m[3], 'en')}] releasing on ${m[2]}!\nStarting from this release, SECRET versions will feature a special foil processing.\n\n[${localizeBSName(m[3], 'en')}] will be available starting ${m[2]}!\n\nрҹ”ҪProduct Page:\n${transformLink(m[7], 'en', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        zh: (m) => `е…¬й–Ӣ${m[2]}зҷје”®зҡ„гҖҠ${m[3]}гҖӢSECRETзүҲеҚЎзүҢпјҒ\nеҫһжң¬ж¬Ўй–Ӣе§ӢпјҢSECRETзүҲе°ҮжҺЎз”Ёзү№еҲҘзҡ„й–ғеҚЎеҠ е·ҘгҖӮ\n\nгҖҠ${m[3]}гҖӢе°Үж–ј ${m[2]} зҷје”®пјҒ\n\nрҹ”Ҫе•Ҷе“Ғй Ғйқўпјҡ\n${transformLink(m[7], 'zh', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`,
                        th: (m) => `а№ҖаёңаёўаёҒаёІаёЈа№Ңаё”а№Җаё§аёӯаёЈа№ҢаёҠаёұаёҷ SECRET аёӮаёӯаёҮ вҖң${localizeBSName(m[3], 'th')}вҖқ аё—аёөа№ҲаёҲаё°аё§аёІаёҮаёҲаёіаё«аёҷа№ҲаёІаёўа№ғаёҷаё§аёұаёҷаё—аёөа№Ҳ ${m[2]}!\nаё•аёұа№үаёҮа№Ғаё•а№ҲаёҠаёёаё”аёҷаёөа№үа№Җаёӣа№Үаёҷаё•а№үаёҷа№„аёӣ аёҒаёІаёЈа№Ңаё”а№Җаё§аёӯаёЈа№ҢаёҠаёұаёҷ SECRET аёҲаё°а№ғаёҠа№үа№Җаё—аё„аёҷаёҙаё„а№Җаё„аёҘаё·аёӯаёҡаёҹаёӯаёўаёҘа№Ңа№Ғаёҡаёҡаёһаёҙа№ҖаёЁаё© \nвҖң${localizeBSName(m[3], 'th')}вҖқ аёЎаёөаёҒаёіаё«аёҷаё”аё§аёІаёҮаёҲаёіаё«аёҷа№ҲаёІаёў ${m[2]} аёҷаёөа№ү!\n\nрҹ”Ҫаё«аёҷа№үаёІаёӘаёҙаёҷаё„а№үаёІ:\n${transformLink(m[7], 'th', m[3].includes("гӮЁгӮҝгғјгғҠгғ«"))}`
                    },
                    hashtags: "#BattleSpirits"
                },
                {

                            return `зӮәжӮЁд»Ӣзҙ№гҖҺ${localizeDigimonPackName(m[1], 'zh')}гҖҸзҡ„${type}гҖӮ\nд»ҠеӨ©зҡ„еҚЎзүҮжҳҜгҖҢ${getDigimonName(m[3])}гҖҚгҖҢ${getDigimonName(m[4])}гҖҚпјҒ\nрҹ”Ҫи©ізҙ°\n${m[5].replace('://', '://hk.')}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`;
                        },
                        th: (m) => {
                            const type = m[2] === "гғ‘гғ©гғ¬гғ«гӮ«гғјгғү" ? "Parallel Cards" : "аёҒаёІаёЈа№Ңаё”";
                            return `а№Ғаёҷаё°аёҷаёі${type}аёҲаёІаёҒ ${localizeDigimonPackName(m[1], 'th')}!\nаё§аёұаёҷаёҷаёөа№үа№ҖаёЈаёІаёӮаёӯа№Ғаёҷаё°аёҷаёіаёҒаёІаёЈа№Ңаё” вҖң${getDigimonName(m[3])}вҖқ а№ҒаёҘаё° вҖң${getDigimonName(m[4])}вҖқ!\nрҹ”ҪаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”\n${m[5].replace('://', '://en.')}`;
                        }
                    },
                    hashtags: "#DigimonCardGame\n#DigimonTCG\n#Digimon\n#ж•ёзўјеҜ¶иІқеҚЎзүҢйҒҠжҲІ"
                },
                {
                    name: "Digimon Single Card Reveal",
                    // Fixed: Added \s* to match with or without spaces
                    pattern: /вҳ…гӮ«гғјгғүзҙ№д»Ӣвҳ…\s*гҖҺ(.*?)гҖҸгҒ®(гӮ«гғјгғү|гғ‘гғ©гғ¬гғ«гӮ«гғјгғү)гӮ’гҒ”зҙ№д»ӢгҖӮ\s*жң¬ж—ҘгҒ®гӮ«гғјгғүгҒҜгҖҢ(.*?)гҖҚгҒ§гҒҷпјҒ\s*рҹ”Ҫи©ізҙ°\s*(https?:\/\/\S+)/,
                    prefix: (m) => `вҳ…Card Reveal / еҚЎзүҢд»Ӣзҙ№ / а№Ғаёҷаё°аёҷаёіаёҒаёІаёЈа№Ңаё”вҳ…\n\n`,
                    outputs: {
                        en: (m) => {
                            const type = m[2] === "гғ‘гғ©гғ¬гғ«гӮ«гғјгғү" ? "Parallel Card" : "cards";
                            return `Introducing the ${type} from the ${localizeDigimonPackName(m[1], 'en')}!\nTodayвҖҷs card is [${getDigimonName(m[3])}]!\nрҹ”ҪDetails\n${m[4].replace('://', '://en.')}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`;
                        },
                        zh: (m) => {
                            const type = m[2] === "гғ‘гғ©гғ¬гғ«гӮ«гғјгғү" ? "е№іиЎҢеҚЎ" : "еҚЎзүҮ";
                            return `зӮәжӮЁд»Ӣзҙ№гҖҺ${localizeDigimonPackName(m[1], 'zh')}гҖҸзҡ„${type}гҖӮ\nд»ҠеӨ©зҡ„еҚЎзүҮжҳҜгҖҢ${getDigimonName(m[3])}гҖҚпјҒ\nрҹ”Ҫи©ізҙ°\n${m[4].replace('://', '://hk.')}\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ`;
                        },
                        th: (m) => {
                            const type = m[2] === "гғ‘гғ©гғ¬гғ«гӮ«гғјгғү" ? "Parallel Card" : "аёҒаёІаёЈа№Ңаё”";
                            return `а№Ғаёҷаё°аёҷаёі${type}аёҲаёІаёҒ ${localizeDigimonPackName(m[1], 'th')}!\nаё§аёұаёҷаёҷаёөа№үа№ҖаёЈаёІаёӮаёӯа№Ғаёҷаё°аёҷаёіаёҒаёІаёЈа№Ңаё” вҖң${getDigimonName(m[3])}вҖқ!\nрҹ”ҪаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”\n${m[4].replace('://', '://en.')}`;
                        }
                    },
                    hashtags: "#DigimonCardGame\n#DigimonTCG\n#Digimon\n#ж•ёзўјеҜ¶иІқеҚЎзүҢйҒҠжҲІ"
                }
            ];
            const jpInput = document.getElementById('jpInput');
            const finalOutput = document.getElementById('finalOutput');
            const translateBtn = document.getElementById('translateBtn');
            const errorDiv = document.getElementById('errorMessage');
            const warningDiv = document.getElementById('warningMessage');

            translateBtn.addEventListener('click', () => {
                resetCopyButton();
                const rawText = jpInput.value.trim();
                const normalizedText = rawText.replace(/\s+/g, ' ');
                
                errorDiv.style.display = 'none';
                warningDiv.style.display = 'none';
                missingTranslations = []; // Reset warnings
                finalOutput.value = '';

                if (!rawText) return;

                let matched = false;
                for (const tmpl of translationTemplates) {
                    const match = normalizedText.match(tmpl.pattern);
                    if (match) {
                        renderOutput(tmpl, match);
                        matched = true;
                        break;
                    }
                }

                if (!matched) {
                    errorDiv.textContent = "гӮЁгғ©гғјпјҡгғҶгӮӯгӮ№гғҲеҪўејҸгҒҢиӘҚиӯҳгҒ•гӮҢгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮеҜҫеҝңгҒҷгӮӢгғҶгғігғ—гғ¬гғјгғҲгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҖӮ";
                    errorDiv.style.display = 'block';
                } else if (missingTranslations.length > 0) {
                    // show jp message
                    warningDiv.innerHTML = "<strong>гҖҗзўәиӘҚдәӢй …гҖ‘</strong> иҫһжӣёгҒ«жңӘзҷ»йҢІгҖҒгҒҫгҒҹгҒҜжүӢеӢ•зўәиӘҚгҒҢеҝ…иҰҒгҒӘй …зӣ®гҒҢгҒӮгӮҠгҒҫгҒҷпјҡ<br><ul>" + 
                        missingTranslations.map(item => `<li>${item}</li>`).join('') + "</ul>";
                    warningDiv.style.display = 'block';
                }
            });
            finalOutput.addEventListener('input', () => {
                resetCopyButton();
            });
            function renderOutput(template, matchGroups) {
                const results = [];
                const useEn = document.getElementById('langEn').checked;
                const useZh = document.getElementById('langZh').checked;
                const useTh = document.getElementById('langTh').checked;

                if (useEn) results.push(template.outputs.en(matchGroups));
                if (useZh) results.push(template.outputs.zh(matchGroups));
                if (useTh) results.push(template.outputs.th(matchGroups));

                const prefixStr = template.prefix ? template.prefix(matchGroups) : "";
                const hashtagStr = template.hashtags ? '\n\n\n' + template.hashtags : "";

                finalOutput.value = prefixStr + results.join('\n\n') + hashtagStr;
            }

            // Add this to your <script> block
            const editBtn = document.getElementById('editBtn');

            editBtn.addEventListener('click', () => {
                const isReadOnly = finalOutput.readOnly;
                
                if (isReadOnly) {
                    // Switch to Edit Mode
                    finalOutput.readOnly = false;
                    finalOutput.focus();
                    editBtn.textContent = "е®ҢдәҶ";
                    editBtn.style.backgroundColor = "var(--pico-ins-color)"; // Optional: green tint
                    editBtn.style.color = "#fff"; // Optional: white text for contrast
                } else {
                    // Switch back to Read Only
                    finalOutput.readOnly = true;
                    editBtn.textContent = "з·ЁйӣҶ";
                    editBtn.style.backgroundColor = ""; // Reset color
                    editBtn.style.color = ""; // Reset color
                }
            });

            // Copy Button Functionality
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.addEventListener('click', () => {
                const output = document.getElementById('finalOutput');
                if (!output.value) return;

                navigator.clipboard.writeText(output.value).then(() => {
                    clearTimeout(copyResetTimeout);
                    copyBtn.textContent = "гӮігғ”гғје®ҢдәҶ!";
                    copyBtn.classList.remove('outline');
                    
                    // Return to normal after 2 seconds
                    copyResetTimeout = setTimeout(resetCopyButton, 2000);
                });
            });

            /* --- CSV PROCESSING MECHANIC --- */
            document.getElementById('processCsvBtn').addEventListener('click', () => {
                const fileInput = document.getElementById('csvFileInput');
                if (!fileInput.files.length) {
                    alert("Please upload a CSV file first.");
                    return;
                }
            
                const file = fileInput.files[0];
                const reader = new FileReader();
            
                reader.onload = (e) => {
                    let csvText = e.target.result;
                    // Handle UTF-8 BOM if present
                    if (csvText.startsWith('\ufeff')) csvText = csvText.slice(1);
                    
                    const lines = parseCSV(csvText);
                    if (lines.length < 2) {
                        alert("CSV is empty or invalid.");
                        return;
                    }
            
                    const headers = lines[0];
                    const textColIdx = headers.indexOf('гғҶгӮӯгӮ№гғҲ');
                    
                    if (textColIdx === -1) {
                        alert("Error: Column 'гғҶгӮӯгӮ№гғҲ' not found in CSV.");
                        return;
                    }
            
                    const newHeaders = [...headers, "Translated Text", "Translation Warnings"];
                    const resultRows = [newHeaders];
            
                    const useEn = document.getElementById('langEn').checked;
                    const useZh = document.getElementById('langZh').checked;
                    const useTh = document.getElementById('langTh').checked;
            
                    for (let i = 1; i < lines.length; i++) {
                        const row = lines[i];
                        if (!row[textColIdx]) continue;
            
                        const rawText = row[textColIdx].trim();
                        const normalizedText = rawText.replace(/\s+/g, ' ');
            
                        let matchedTemplate = null;
                        let matchResult = null;
                        
                        // Reset warnings for this specific row
                        missingTranslations = [];
            
                        for (const tmpl of translationTemplates) {
                            const m = normalizedText.match(tmpl.pattern);
                            if (m) {
                                matchedTemplate = tmpl;
                                matchResult = m;
                                break;
                            }
                        }
            
                        // Only keep the row if a template matched (Delete others)
                        if (matchedTemplate) {
                            const finalTranslations = [];
                            if (useEn) finalTranslations.push(matchedTemplate.outputs.en(matchResult));
                            if (useZh) finalTranslations.push(matchedTemplate.outputs.zh(matchResult));
                            if (useTh) finalTranslations.push(matchedTemplate.outputs.th(matchResult));
            
                            const prefix = matchedTemplate.prefix ? matchedTemplate.prefix(matchResult) : "";
                            const hashtags = matchedTemplate.hashtags ? '\n\n\n' + matchedTemplate.hashtags : "";
                            
                            const fullTranslation = prefix + finalTranslations.join('\n\n') + hashtags;
                            const warnings = missingTranslations.length > 0 ? missingTranslations.join('; ') : "None";
            
                            resultRows.push([...row, fullTranslation, warnings]);
                        }
                    }
            
                    downloadCSV(resultRows);
                };
                reader.readAsText(file);
            });

            // CSV Parser to handle quotes, commas, and newlines correctly
            function parseCSV(text) {
                const rows = [];
                let row = [];
                let field = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i+1];
                    if (inQuotes) {
                        if (char === '"' && nextChar === '"') { field += '"'; i++; }
                        else if (char === '"') { inQuotes = false; }
                        else { field += char; }
                    } else {
                        if (char === '"') { inQuotes = true; }
                        else if (char === ',') { row.push(field); field = ''; }
                        else if (char === '\n' || char === '\r') {
                            row.push(field);
                            if (row.length > 1 || row[0] !== '') rows.push(row);
                            row = []; field = '';
                            if (char === '\r' && nextChar === '\n') i++;
                        } else { field += char; }
                    }
                }
                if (row.length || field) { row.push(field); rows.push(row); }
                return rows;
            }
            
            // Function to generate and trigger the CSV download
            function downloadCSV(rows) {
                // \ufeff ensures Excel opens the file with UTF-8 encoding (prevents Japanese gibberish)
                const csvContent = "\ufeff" + rows.map(r => r.map(cell => `"${(cell || "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "translated_social_posts.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

        </script>
    </main>
