---
layout: default
title: Home Page
---
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Post Auto-Translator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .error-msg { color: #d93526; background: #ffebee; padding: 1rem; border-radius: 8px; display: none; margin-bottom: 1rem; }
        textarea { font-family: monospace; font-size: 0.9rem; }
        .warning-msg { color: #856404; background: #fff3cd; padding: 1rem; border-radius: 8px; display: none; margin-bottom: 1rem; border: 1px solid #ffeeba; }
        .grid-container { align-items: start; gap: 2rem; }
        .button-group {
            display: flex;
            gap: 0.5rem;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            margin-bottom: 0.5rem;
        }

        .field-header label { margin-bottom: 0; }

        #copyBtn, #editBtn { 
            padding: 4px 12px; 
            font-size: 0.8rem; 
            width: auto; 
            margin-bottom: 0;
        }
    </style>
    <script src="names.js"></script>
</head>

<body>
    <main class="container">
    <h1>Social Media Post Auto-Translator</h1>

        <div class="grid">
            <!-- Left Column: Input & Settings -->
            <section>
            <div class="field-header">
                <label for="jpInput">Paste Japanese Source Text</label>
            </div>
            <textarea id="jpInput" rows="10" placeholder="Paste the Japanese post here..."></textarea>
                
                <div id="warningMessage" class="warning-msg"></div>
                <div id="errorMessage" class="error-msg"></div>

                <fieldset>
                    <legend>Include Languages:</legend>
                    <label><input type="checkbox" id="langEn" checked> English</label>
                    <label><input type="checkbox" id="langZh" checked> Chinese</label>
                    <label><input type="checkbox" id="langTh" checked> Thai</label>
                </fieldset>

                <button id="translateBtn" class="contrast">Detect & Generate Translation</button>
            </section>

            <!-- Right Column: Output -->
            <section>
                <div class="field-header">
                    <label for="finalOutput">Final Output</label>
                    <div class="button-group">
                        <button id="editBtn" class="secondary outline">編集</button>
                        <button id="copyBtn" class="secondary outline">コピー</button>
                    </div>
                </div>
                <textarea id="finalOutput" readonly rows="20"></textarea>
            </section>
        </div>

        <script>

            let copyResetTimeout;

            function resetCopyButton() {
                clearTimeout(copyResetTimeout);
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = "コピー";
                copyBtn.classList.add('outline');
            }

            const glossary_jp_to_en = {
                "バトスピエントリーデッキ": "Battle Spirits Entry Deck",
                "赫焔ノ風牙": "/ Fangs of the Crimson",
                "紫幻ノ血醒": "/ Specter of the Violet",
                "翆海ノ甲魚": "/ Predator of the Wild",
                "白命ノ鉱人": "/ Colossus of the White",
                "煌陽ノ雷竜": "/ Dragon of the Thunderbolt",
                "創世の鼓動": "/ The Pulse of Genesis",
                "蒼淵ノ凶獣": "/ Savage of the Azure Abyss",
                "永皇の輝き": "/ Radiance of the Eternal Emperor",
                "ブースターパック DUAL REVOLUTION": "BOOSTER PACK DUAL REVOLUTION",
                "スタートデッキ DIGIMON BEATBREAK": "STARTER DECK DIGIMON BEATBREAK",
                "幻惑の翔風": "/ Enchanted Skywind"
            }

            const glossary_jp_to_zh = {
                "ブースターパック DUAL REVOLUTION": "補充包 雙重巨變",
                "スタートデッキ DIGIMON BEATBREAK": "起始牌組 節奏破碎"
            }

            const colorMap = {
                "緑": { en: "Green", zh: "綠", th: "สีเขียว" },
                "白": { en: "White", zh: "白", th: "สีขาว" },
                "黄": { en: "Yellow", zh: "黃", th: "สีเหลือง" },
                "赤": { en: "Red", zh: "紅", th: "สีแดง" },
                "青": { en: "Blue", zh: "青", th: "สีน้ำเงิน" },
                "紫": { en: "Purple", zh: "紫", th: "สีม่วง" }
            };


            let missingTranslations = [];

            function getDigimonName(name) {
                if (digimon_names[name]) {
                    return name + " / " + digimon_names[name];
                } else {
                    missingTranslations.push(`デジモン: ${name} (英名未登録)`);
                    return name;
                }
            }

            function getOnePieceName(name) {
                if (onepiece_names[name]) {
                    return name + " / " + onepiece_names[name];
                } else {
                    missingTranslations.push(`ONE PIECE: ${name} (英名未登録)`);
                    return name;
                }
            }


            function translateColor(jpColor, lang) {
                return (colorMap[jpColor] && colorMap[jpColor][lang]) ? colorMap[jpColor][lang] : jpColor;
            }

            /** 
             * LINK TRANSFORMER
             * Logic for converting JP links to localized links
             **/
            function transformLink(url, lang, isEternal = false) {
                if (!url) return "";
                const domainRegex = /(www\.)?battlespirits\.com/;
                let targetDomain;
                
                if (isEternal) {
                    targetDomain = (lang === 'zh') ? 'tw.battlespirits.com' : 'en.battlespirits.com';
                } else {
                    targetDomain = (lang === 'zh') ? 'asia-tw.battlespirits.com' : 'asia-en.battlespirits.com';
                }
                
                return url.replace(domainRegex, targetDomain);
            }

            function localizeBSName(text, lang) {
                if (!text) return "";
                if (lang === 'zh') return text;
                
                let localizedText = text;
                let foundMatch = false;
            
                for (const [jp, en] of Object.entries(glossary_jp_to_en)) {
                    if (localizedText.includes(jp)) {
                        foundMatch = true;
                        if (String(en).includes("/")) {
                            localizedText = localizedText.replace(jp, `${jp} ${en}`);
                        } else {
                            localizedText = localizedText.replace(jp, en);
                        }
                    }
                }
            
                // Warning for missing Battle Spirits title in English/Thai
                if (lang !== 'zh' && !foundMatch) {
                    const warningMsg = `BSタイトル: ${text} (英名未登録)`;
                    if (!missingTranslations.includes(warningMsg)) {
                        missingTranslations.push(warningMsg);
                    }
                }
            
                return localizedText;
            }

            function localizeDigimonPackName(text, lang) {
                if (!text) return "";
                let localizedText = text;
                let foundMatch = false;
            
                if (lang === 'zh') {
                    for (const [jp, zh] of Object.entries(glossary_jp_to_zh)) {
                        if (localizedText.includes(jp)) {
                            localizedText = localizedText.replace(jp, zh);
                        }
                    }
                    // Simplified check: if it's still the same after glossary check, it's "not found"
                    // (Optional: you can add a warning for Chinese here too if needed)
                } else if (lang === 'en' || lang === 'th') {
                    for (const [jp, en] of Object.entries(glossary_jp_to_en)) {
                        if (localizedText.includes(jp)) {
                            foundMatch = true;
                            localizedText = localizedText.replace(jp, en);
                        }
                    }
            
                    // Warning for missing Digimon Pack title in English/Thai
                    if (!foundMatch) {
                        const warningMsg = `デジモンパック名: ${text} (英名未登録)`;
                        if (!missingTranslations.includes(warningMsg)) {
                            missingTranslations.push(warningMsg);
                        }
                    }
                }
            
                return localizedText;
            }

            /** 
             * TEMPLATES
             * pattern: Regex to match normalized (single-spaced) text.
             * vars: mapping match groups to specific logic (like link transformation).
             **/
            const translationTemplates = [
                {
                    name: "Card Reveal",
                    // $1: Code, $2: Card Name, $3: Pack Name, $4: Date, $5: Suffix, $6: URL
                    pattern: /【(.*?)カード紹介】\s*新規カード「(.*?)」を公開！\s*『(.*?)』は(.*?)(?:\(.\))?(発売予定|発売中|発売)！\s*🔽商品ページ\s*(https?:\/\/\S+)/,
                    prefix: (m) => `【${m[1]} Card Reveal / 卡牌介紹 / แนะนำการ์ด】\n\n`,
                    outputs: {
                        en: (m) => `Revealing the new card "${m[2]}"!\n[${localizeBSName(m[3], 'en').replace("バトルスピリッツ", "Battle Spirits").replace("エターナル", "Eternal").replace("ブースター", " Booster:")}] will be available starting ${m[4]}!\n🔽Details:\n${transformLink(m[6], 'en', m[3].includes("エターナル"))}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        zh: (m) => `公開「${m[2]}」卡牌！\n《${m[3].replace("バトルスピリッツ", "Battle Spirits").replace("バトスピエントリーデッキ", "Battle Spirits入門牌組").replace("エターナル", "Eternal").replace("ブースター", "補充包")}》將於 ${m[4]} 發售！\n🔽詳細：\n${transformLink(m[6], 'zh', m[3].includes("エターナル"))}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        th: (m) => `มาแล้ว! การ์ดใหม่ “${m[2]}”!\n“${localizeBSName(m[3], 'th').replace("バトルスピリッツ", "Battle Spirits").replace("エターナル", "Eternal").replace("ブースター", " Booster:")}” มีกำหนดวางจำหน่าย ${m[4]} นี้!\n🔽รายละเอียด\n${transformLink(m[6], 'th', m[3].includes("エターナル"))}`
                    },
                    hashtags: "#BattleSpirits"
                },
                {
                    name: "Product Reveal",
                    // Matches: 【ID 商品紹介】... スタンダード第[二2]弾『Pack』で登場する...イラストを公開！
                    // $1: ID, $2: PackName, $3: Color, $4: CardName, $5: PackName(repeat), $6: Date
                    pattern: /【(.*?)商品紹介】.*?スタンダード第[二2]弾『(.*?)』で登場する(.*?)のXレア「(.*?)」のイラストを公開！.*?『ブースターパック (.*?)』は(.*?)(?:\(.\))?(発売|発売中)！/,
                    prefix: (m) => `【${m[1]} Product Reveal / 商品公開 / ข้อมูลสินค้า】\n\n`,
                    outputs: {
                        en: (m) => `Revealing the illustration for ${translateColor(m[3], 'en')} X Rare "${m[4]}"!\nStandard 2nd Booster Pack [${localizeBSName(m[2], 'en')}] will be available starting ${m[6]}!\n\n━━━━━━━━━━━━━━━━━━━━`,
                        zh: (m) => `公開將於Standard系列第二彈《${m[2]}》中登場的${translateColor(m[3], 'zh')}屬性X稀有「${m[4]}」插圖！\n《補充包 ${m[5]}》將於 ${m[6]} 發售！\n\n━━━━━━━━━━━━━━━━━━━━`,
                        th: (m) => `มาแล้ว! ภาพอิลลัสต์ของ X Rare ${translateColor(m[3], 'th')} “${m[4]}”!\nStandard 2nd Booster Pack “${localizeBSName(m[5], 'th')}” มีกำหนดวางจำหน่าย ${m[6]} นี้!`
                    },
                    hashtags: "#BattleSpirits"
                },
                {
                    name: "Gundam Card Reveal",
                    pattern: /【収録カード紹介】 「(.*?)」を紹介！ ブースターパック『(.*?)』は(.*?)(?:\(.\))?\s*発売.*?▽商品ページはこちら (https?:\/\/\S+)/,
                    prefix: (m) => {
                        missingTranslations.push(`ガンダム: ${m[1]} (英語名はインターネットで確認してください)`);
                        return `【Card Reveal / 卡牌介紹 / แนะนำการ์ด】\n\n`;
                    },
                    outputs: {
                        en: (m) => `Introducing "${m[1]}"!\nBooster Pack [${m[2]}] releases on ${m[3]}!\n▽Product Info\n${m[4].replace('/jp/', '/asia-en/')}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        zh: (m) => `介紹「${m[1]}」!\n補充包『${m[2]}』將於 ${m[3]} 發售！\n▽商品資訊\n${m[4].replace('/jp/', '/zh-tw/')}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        th: (m) => `แนะนำการ์ด "${m[1]}"!\nBooster Pack "${m[2]}" วางจำหน่ายวันที่ ${m[3]}!\n▽ข้อมูลสินค้า\n${m[4].replace('/jp/', '/th/')}`
                    },
                    hashtags: "#GundamCardGame\n#GCG\n#高達卡牌"
                },
                {
                    name: "Gundam Parallel Card Reveal",
                    pattern: /【収録カード紹介】パラレルカード「(.*?)」を紹介！ ブースターパック『(.*?)』は(.*?)(?:\(.\))?\s*発売.*?▽商品ページはこちら (https?:\/\/\S+)/,
                    prefix: (m) => {
                        missingTranslations.push(`ガンダム: ${m[1]} (英語名はインターネットで確認してください)`);
                        return `【Card Reveal / 卡牌介紹 / แนะนำการ์ด】\n\n`;
                    },
                    outputs: {
                        en: (m) => `Introducing Parallel Card "${m[1]}"!\nBooster Pack [${m[2]}] releases on ${m[3]}!\n▽Product Info\n${m[4].replace('/jp/', '/asia-en/')}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        zh: (m) => `介紹平行卡「${m[1]}」!\n補充包『${m[2]}』將於 ${m[3]} 發售！\n▽商品資訊\n${m[4].replace('/jp/', '/zh-tw/')}\n\n━━━━━━━━━━━━━━━━━━━━`,
                        th: (m) => `แนะนำ Parallel Card "${m[1]}"!\nBooster Pack "${m[2]}" วางจำหน่ายวันที่ ${m[3]}!\n▽ข้อมูลสินค้า\n${m[4].replace('/jp/', '/th/')}`
                    },
                    hashtags: "#GundamCardGame\n#GCG\n#高達卡牌"
                },
                {
                    name: "One Piece Booster Reveal",
                    // Matches normalized text: 
                    // $1: Code (OP-16), $2: Date (5/30), $3: Pack Name, $4: Card Name, $5: URL
                    pattern: /★(.*?)カード紹介★ (.*?)発売のブースターパック『(.*?)』に収録するカードをご紹介！ 今回は.*?「(.*?)」です。 ▼商品情報はコチラ (https?:\/\/\S+)/,
                    prefix: (m) => `★${m[1]} Card Reveal / ${m[1]}卡公開 / ${m[1]} แนะนำการ์ดในเซ็ต★\n\n`,
                    outputs: {
                        en: (m) => {
                            const opUrl = m[5].replace('onepiece', 'asia-en.onepiece').replace('.html', '.php');
                            return `Introducing the Character Card "${getOnePieceName(m[4])}"! This card will be included in Booster Pack: ${m[3]} releasing on ${m[2]}!\n▼Product Info\n${opUrl}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        zh: (m) => {
                            const opUrl = m[5].replace('onepiece', 'asia-tc.onepiece').replace('.html', '.php');
                            return `我將向您介紹將於${m[2]} 發售的補充包：${m[3]} 收錄卡片！這次是角色卡「${getOnePieceName(m[4])}」。\n▼商品資訊\n${opUrl}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        th: (m) => {
                            const opUrl = m[5].replace('onepiece', 'asia-th.onepiece').replace('.html', '.php');
                            return `แนะนำการ์ดจาก Booster Pack ${m[3]} วางจำหน่าย ${m[2]} นี้! ครั้งนี้เป็นการ์ดตัวละคร "${getOnePieceName(m[4])}"!\n▼ข้อมูลสินค้า คลิกที่นี่\n${opUrl}`;
                        }
                    },
                    hashtags: "#ONEPIECE\n#ONEPIECECardgame\n#航海王卡牌"
                },
                {
                    name: "Digimon Double Card Reveal",
                    // $1: Full Title, $2: Type (card/parallel), $3: Monster 1, $4: Monster 2, $5: URL
                    pattern: /★カード紹介★ 『(.*?)』の(カード|パラレルカード)をご紹介。 本日のカードは「(.*?)」「(.*?)」です！ 🔽詳細 (https?:\/\/\S+)/,
                    prefix: (m) => `★Card Reveal / 卡牌介紹 / แนะนำการ์ด★\n\n`,
                    outputs: {
                        en: (m) => {
                            const type = m[2] === "パラレルカード" ? "Parallel Cards" : "cards";
                            return `Introducing ${type} from the ${localizeDigimonPackName(m[1], 'en')}!\nToday’s cards are [${getDigimonName(m[3])}] and [${getDigimonName(m[4])}]!\n🔽Details\n${m[5].replace('://', '://en.')}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        zh: (m) => {
                            const type = m[2] === "パラレルカード" ? "平行卡" : "卡片";
                            return `為您介紹『${localizeDigimonPackName(m[1], 'zh')}』的${type}。\n今天的卡片是「${getDigimonName(m[3])}」「${getDigimonName(m[4])}」！\n🔽詳細\n${m[5].replace('://', '://hk.')}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        th: (m) => {
                            const type = m[2] === "パラレルカード" ? "Parallel Cards" : "การ์ด";
                            return `แนะนำ${type}จาก ${localizeDigimonPackName(m[1], 'th')}!\nวันนี้เราขอแนะนำการ์ด “${getDigimonName(m[3])}” และ “${getDigimonName(m[4])}”!\n🔽รายละเอียด\n${m[5].replace('://', '://en.')}`;
                        }
                    },
                    hashtags: "#DigimonCardGame\n#DigimonTCG\n#Digimon\n#數碼寶貝卡牌遊戲"
                },
                {
                    name: "Digimon Single Card Reveal",
                    // $1: Full Title, $2: Type (card/parallel), $3: Monster 1, $4: URL
                    pattern: /★カード紹介★ 『(.*?)』の(カード|パラレルカード)をご紹介。 本日のカードは「(.*?)」です！ 🔽詳細 (https?:\/\/\S+)/,
                    prefix: (m) => `★Card Reveal / 卡牌介紹 / แนะนำการ์ด★\n\n`,
                    outputs: {
                        en: (m) => {
                            const type = m[2] === "パラレルカード" ? "Parallel Card" : "cards";
                            return `Introducing the ${type} from the ${localizeDigimonPackName(m[1], 'en')}!\nToday’s card is [${getDigimonName(m[3])}]!\n🔽Details\n${m[4].replace('://', '://en.')}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        zh: (m) => {
                            const type = m[2] === "パラレルカード" ? "平行卡" : "卡片";
                            return `為您介紹『${localizeDigimonPackName(m[1], 'zh')}』的${type}。\n今天的卡片是「${getDigimonName(m[3])}」！\n🔽詳細\n${m[4].replace('://', '://hk.')}\n\n━━━━━━━━━━━━━━━━━━━━`;
                        },
                        th: (m) => {
                            const type = m[2] === "パラレルカード" ? "Parallel Card" : "การ์ด";
                            return `แนะนำ${type}จาก ${localizeDigimonPackName(m[1], 'th')}!\nวันนี้เราขอแนะนำการ์ด “${getDigimonName(m[3])}”!\n🔽รายละเอียด\n${m[4].replace('://', '://en.')}`;
                        }
                    },
                    hashtags: "#DigimonCardGame\n#DigimonTCG\n#Digimon\n#數碼寶貝卡牌遊戲"
                }
            ];
            const jpInput = document.getElementById('jpInput');
            const finalOutput = document.getElementById('finalOutput');
            const translateBtn = document.getElementById('translateBtn');
            const errorDiv = document.getElementById('errorMessage');
            const warningDiv = document.getElementById('warningMessage');

            translateBtn.addEventListener('click', () => {
                resetCopyButton();
                const rawText = jpInput.value.trim();
                const normalizedText = rawText.replace(/\s+/g, ' ');
                
                errorDiv.style.display = 'none';
                warningDiv.style.display = 'none';
                missingTranslations = []; // Reset warnings
                finalOutput.value = '';

                if (!rawText) return;

                let matched = false;
                for (const tmpl of translationTemplates) {
                    const match = normalizedText.match(tmpl.pattern);
                    if (match) {
                        renderOutput(tmpl, match);
                        matched = true;
                        break;
                    }
                }

                if (!matched) {
                    errorDiv.textContent = "エラー：テキスト形式が認識されませんでした。対応するテンプレートが見つかりません。";
                    errorDiv.style.display = 'block';
                } else if (missingTranslations.length > 0) {
                    // show jp message
                    warningDiv.innerHTML = "<strong>【確認事項】</strong> 辞書に未登録、または手動確認が必要な項目があります：<br><ul>" + 
                        missingTranslations.map(item => `<li>${item}</li>`).join('') + "</ul>";
                    warningDiv.style.display = 'block';
                }
            });
            finalOutput.addEventListener('input', () => {
                resetCopyButton();
            });
            function renderOutput(template, matchGroups) {
                const results = [];
                const useEn = document.getElementById('langEn').checked;
                const useZh = document.getElementById('langZh').checked;
                const useTh = document.getElementById('langTh').checked;

                if (useEn) results.push(template.outputs.en(matchGroups));
                if (useZh) results.push(template.outputs.zh(matchGroups));
                if (useTh) results.push(template.outputs.th(matchGroups));

                const prefixStr = template.prefix ? template.prefix(matchGroups) : "";
                const hashtagStr = template.hashtags ? '\n\n\n' + template.hashtags : "";

                finalOutput.value = prefixStr + results.join('\n\n') + hashtagStr;
            }

            // Add this to your <script> block
            const editBtn = document.getElementById('editBtn');

            editBtn.addEventListener('click', () => {
                const isReadOnly = finalOutput.readOnly;
                
                if (isReadOnly) {
                    // Switch to Edit Mode
                    finalOutput.readOnly = false;
                    finalOutput.focus();
                    editBtn.textContent = "完了";
                    editBtn.style.backgroundColor = "var(--pico-ins-color)"; // Optional: green tint
                    editBtn.style.color = "#fff"; // Optional: white text for contrast
                } else {
                    // Switch back to Read Only
                    finalOutput.readOnly = true;
                    editBtn.textContent = "編集";
                    editBtn.style.backgroundColor = ""; // Reset color
                    editBtn.style.color = ""; // Reset color
                }
            });

            // Copy Button Functionality
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.addEventListener('click', () => {
                const output = document.getElementById('finalOutput');
                if (!output.value) return;

                navigator.clipboard.writeText(output.value).then(() => {
                    clearTimeout(copyResetTimeout);
                    copyBtn.textContent = "コピー完了!";
                    copyBtn.classList.remove('outline');
                    
                    // Return to normal after 2 seconds
                    copyResetTimeout = setTimeout(resetCopyButton, 2000);
                });
            });

        </script>
    </main>
</body>

</html>
